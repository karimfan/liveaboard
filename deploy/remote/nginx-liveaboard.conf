# nginx site config for liveaboard. Installed at
# /etc/nginx/sites-available/liveaboard and symlinked into sites-enabled.
# Terminates TLS with a self-signed cert and reverse-proxies to the
# Go backend on localhost:8080.

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/liveaboard/tls.crt;
    ssl_certificate_key /etc/liveaboard/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
